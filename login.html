<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Poflix with Google to track your watched movies and series.">
  <title>Poflix — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      max-width: 450px;
      margin: 100px auto;
      padding: 3rem 2.5rem;
      background: var(--bg-glass-strong);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .login-header img {
      width: 64px;
      height: 64px;
      margin-bottom: 1.5rem;
      border-radius: var(--radius-md);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .login-header h2 {
      margin-bottom: 0.5rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
    }
    .login-header p {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }
    .login-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .google-btn-wrapper {
      width: 100%;
      height: 50px;
      display: flex;
      justify-content: center;
    }
    .privacy-notice {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    #auth-status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--accent);
      min-height: 1.4em;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
    </div>
  </nav>

  <main>
    <div class="login-container">
      <div class="login-header">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🍿</div>
        <h2>Sign In to Poflix</h2>
        <p>Your "Watched List" will be saved to a private Google Spreadsheet in your own Google Drive. You own your data!</p>
      </div>

      <div class="login-actions">
        <button class="btn-login-nav" onclick="startGoogleLogin()" style="padding: 0.8rem 2rem; font-size: 1.1rem;">
          Sign in with Google
        </button>
        <div id="auth-status"></div>
      </div>

      <div class="privacy-notice">
        By signing in, you allow Poflix to create and manage a data file in your Google Drive (spreadsheet only). We never see your other files.
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
