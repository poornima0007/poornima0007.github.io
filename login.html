<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Poflix with Google to sync your watchlist and history across devices.">
  <title>Login — Poflix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
      <ul class="navbar-nav" id="navbar-nav" style="margin-left:auto;">
        <li><a href="index.html">Home</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <div class="login-page">
      <div class="login-bg"></div>
      <div class="login-card glass-card">
        <div class="login-logo">Poflix</div>
        <p class="login-subtitle">Sign in to sync your watchlist &amp; history across devices</p>

        <button class="google-btn" id="google-login-btn" onclick="startGoogleLogin()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>

        <div style="margin-bottom:1.25rem;text-align:center;color:var(--text-muted);font-size:0.85rem;">or</div>

        <a href="index.html" style="display:block;text-align:center;padding:0.7rem;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);font-size:0.9rem;transition:all var(--transition);" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
          Continue without login
        </a>

        <div class="auth-status" id="auth-status"></div>

        <div class="login-note" style="margin-top:1.5rem;">
          🔒 We only access your Google Drive to store your watchlist. We never read personal files.
        </div>
      </div>
    </div>
  </main>

  <div class="toast-container" id="toast-container"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
