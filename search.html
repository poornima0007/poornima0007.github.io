<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search for movies, TV series, and actors on Poflix.">
  <title>Search — Poflix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
      <form class="search-form" action="search.html" method="get" aria-label="Search site" style="position:relative;">
        <input type="text" name="q" id="nav-search-input" placeholder="Search movies, series, actors..." aria-label="Search input" autocomplete="off">
        <button type="submit" aria-label="Search">Search</button>
      </form>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Movies</a></li>
        <li><a href="series.html">Series</a></li>
        <li><a href="wishlist.html">Wishlist</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <div class="search-page">
      <form class="search-page-form" action="search.html" method="get" style="position:relative;">
        <input type="text" name="q" id="search-page-input" class="search-page-input" placeholder="Search for movies, series, actors..." aria-label="Search" autocomplete="off">
        <button type="submit" class="search-page-btn" aria-label="Search">Search</button>
      </form>

      <div id="search-title" class="search-title">Enter a search query to get started</div>

      <div id="search-actor" class="search-subsection"></div>

      <div class="search-subsection" id="search-movies-section" style="display:none;">
        <h3>🎬 Movies</h3>
        <div class="search-grid" id="search-movies"></div>
      </div>

      <div class="search-subsection" id="search-series-section" style="display:none;">
        <h3>📺 Series</h3>
        <div class="search-grid" id="search-series"></div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">Poflix</div>
      <div class="footer-links">
        <a href="movies.html">Movies</a>
        <a href="series.html">Series</a>
        <a href="profile.html">Profile</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="footer-copy">Poflix &copy; 2025. Powered by TMDb API.</div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>
  <div class="toast-container" id="toast-container"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
