<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Poflix profile — view favorites, watchlist, and personalized content.">
  <title>Poflix — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
      <form class="search-form" action="search.html" method="get" aria-label="Search site">
        <input type="text" name="q" placeholder="Search movies, series, actors..." aria-label="Search input">
        <button type="submit" aria-label="Search">Search</button>
      </form>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Movies</a></li>
        <li><a href="series.html">Series</a></li>
        <li><a href="wishlist.html">Wishlist</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;">
      <h2>Your Profile</h2>
    </div>

        <div class="profile-empty">Loading series from Google Sheets...</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">Poflix</div>
      <div class="footer-links">
        <a href="movies.html">Movies</a>
        <a href="series.html">Series</a>
        <a href="profile.html">Profile</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="footer-divider"></div>
    <div class="footer-copy">Poflix &copy; 2025. Not affiliated with Netflix or TMDb. Powered by TMDb API.</div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

  <script src="config.js"></script>
  <script src="script.js"></script>
  <script>
    // Logic to render profile grids from localStorage
    function renderProfileGrids() {
      const watched = getStorage('watched');
      const moviesGrid = document.getElementById('watched-movies-grid');
      const seriesGrid = document.getElementById('watched-series-grid');

      if (moviesGrid && seriesGrid) {
        const movies = watched.filter(i => i.type === 'movie');
        const series = watched.filter(i => i.type === 'tv' || i.type === 'series');

        if (movies.length > 0) {
          moviesGrid.innerHTML = movies.map(item => {
             const obj = { id: item.id, title: item.title, poster_path: item.poster_path, vote_average: 0 };
             return createMovieCard(obj);
          }).join('');
        } else {
          moviesGrid.innerHTML = '<div class="profile-empty">No watched movies found.</div>';
        }

        if (series.length > 0) {
          seriesGrid.innerHTML = series.map(item => {
             const obj = { id: item.id, title: item.title, name: item.title, poster_path: item.poster_path, vote_average: 0 };
             return createSeriesCard(obj);
          }).join('');
        } else {
          seriesGrid.innerHTML = '<div class="profile-empty">No watched series found.</div>';
        }
        
        // Trigger animations
        observeCards(moviesGrid);
        observeCards(seriesGrid);
      }
    }
    
    // Periodically refresh if sheet sync is slow
    let syncChecks = 0;
    const checkSync = setInterval(() => {
      renderProfileGrids();
      syncChecks++;
      if (syncChecks > 10) clearInterval(checkSync);
    }, 2000);

    window.addEventListener('load', renderProfileGrids);
  </script>
</body>
</html>
