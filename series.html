<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse and discover thousands of TV series on Poflix. Filter by genre, year, rating and more.">
  <title>Series — Poflix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
      <form class="search-form" action="search.html" method="get" aria-label="Search site" style="position:relative;">
        <input type="text" name="q" id="nav-search-input" placeholder="Search movies, series, actors..." aria-label="Search input" autocomplete="off">
        <button type="submit" aria-label="Search">Search</button>
      </form>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Movies</a></li>
        <li><a href="series.html" class="active">Series</a></li>
        <li><a href="wishlist.html">Wishlist</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <div class="page-header container">
      <h1>📺 Series</h1>
      <p>Explore thousands of TV shows across every genre</p>
    </div>

    <form class="filter-bar" id="series-filter-form" aria-label="Filter series">
      <div class="filter-search-wrap" style="position:relative;">
        <input type="text" id="series-query" class="filter-input" placeholder="Search series..." aria-label="Series search" autocomplete="off">
      </div>
      <select id="series-genre-select" class="filter-select" aria-label="Genre">
        <option value="">All Genres</option>
      </select>
      <input type="number" id="series-year" class="filter-input" placeholder="Year" min="1900" max="2030" style="width:100px;" aria-label="Year">
      <select id="series-sort" class="filter-select" aria-label="Sort by">
        <option value="popularity.desc">Most Popular</option>
        <option value="vote_average.desc">Top Rated</option>
        <option value="first_air_date.desc">Newest</option>
      </select>
      <button type="submit" class="filter-btn">Apply Filters</button>
    </form>

    <div class="movies-grid" id="series-grid" role="list" aria-live="polite"></div>
    <div class="pagination" id="series-pagination"></div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">Poflix</div>
      <div class="footer-links">
        <a href="movies.html">Movies</a>
        <a href="series.html">Series</a>
        <a href="profile.html">Profile</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="footer-copy">Poflix &copy; 2025. Powered by TMDb API.</div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>
  <div class="toast-container" id="toast-container"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
