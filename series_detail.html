<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Watch TV series on Poflix — episodes, cast, trailer and instant streaming.">
  <title>Series — Poflix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
      <form class="search-form" action="search.html" method="get" aria-label="Search site" style="position:relative;">
        <input type="text" name="q" id="nav-search-input" placeholder="Search movies, series, actors..." aria-label="Search input" autocomplete="off">
        <button type="submit" aria-label="Search">Search</button>
      </form>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Movies</a></li>
        <li><a href="series.html" class="active">Series</a></li>
        <li><a href="wishlist.html">Wishlist</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <!-- Hero backdrop -->
    <div class="detail-hero">
      <div id="series-hero-bg"></div>
      <div class="detail-hero-overlay"></div>
    </div>

    <!-- Detail Layout -->
    <div class="detail-layout">
      <div class="detail-poster" id="series-poster-card"></div>
      <div class="detail-info" id="series-info-card">
        <div class="spinner" style="margin:4rem auto;"></div>
      </div>
    </div>

    <!-- Player + Seasons + Cast + Recs -->
    <div style="max-width:1400px;margin:0 auto;padding:0 1.5rem 4rem;">
      <div id="series-player-section"></div>
      <div id="series-trailer-section"></div>
      <div id="series-cast-section"></div>
      <div id="series-recommendations"></div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">Poflix</div>
      <div class="footer-links">
        <a href="movies.html">Movies</a>
        <a href="series.html">Series</a>
        <a href="profile.html">Profile</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="footer-copy">Poflix &copy; 2025. Powered by TMDb API.</div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>
  <div class="toast-container" id="toast-container"></div>

  <!-- Hidden iframe for Flickv4-style video extraction -->
  <div id="flickv4-extractor" style="position:absolute;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
