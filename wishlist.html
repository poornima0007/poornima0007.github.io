<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Poflix wishlist — all the movies and series you want to watch.">
  <title>Wishlist — Poflix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Poflix</a>
      <form class="search-form" action="search.html" method="get" aria-label="Search site" style="position:relative;">
        <input type="text" name="q" id="nav-search-input" placeholder="Search movies, series, actors..." aria-label="Search input" autocomplete="off">
        <button type="submit" aria-label="Search">Search</button>
      </form>
      <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-nav" id="navbar-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="movies.html">Movies</a></li>
        <li><a href="series.html">Series</a></li>
        <li><a href="wishlist.html" class="active">Wishlist</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="donate.html">Donate</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <div class="wishlist-page">
      <div class="wishlist-header">
        <h1>🔖 My Wishlist</h1>
        <div class="wishlist-tabs">
          <button class="wishlist-tab active" id="wishlist-tab-all" onclick="switchWishlistTab('all')">All</button>
          <button class="wishlist-tab" id="wishlist-tab-movies" onclick="switchWishlistTab('movies')">Movies</button>
          <button class="wishlist-tab" id="wishlist-tab-series" onclick="switchWishlistTab('series')">Series</button>
        </div>
      </div>

      <div id="wishlist-movies-grid" class="wishlist-grid" aria-live="polite"></div>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-brand">Poflix</div>
      <div class="footer-links">
        <a href="movies.html">Movies</a>
        <a href="series.html">Series</a>
        <a href="profile.html">Profile</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="footer-copy">Poflix &copy; 2025. Powered by TMDb API.</div>
  </footer>

  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>
  <div class="toast-container" id="toast-container"></div>

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
